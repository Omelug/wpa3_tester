$schema: "http://json-schema.org/draft-07/schema#"
name: channel_switch_drivers_ts
config_type: test_suite
tests:
  driver_perm:
    type: permutation
    vars:
      driver: [ "rtw_8821cu", "rtw_8821au", "mt76x2u" ]
    config:
      extends: ./channel_switch.yaml
      name: CSA_var_driver_0_var_driver_1_var_driver_2
      actors:
        access_point:
          selection:
            driver: var_driver_0
            condition: ["2_4GHz"]
        client:
          selection:
            driver: var_driver_1
            condition: [ "2_4GHz" ]
        attacker:
          selection:
            driver: var_driver_2
            condition: [ "2_4GHz" ]

delete_old: false
rewrite: "errors"
compile_external: true
install_req: true