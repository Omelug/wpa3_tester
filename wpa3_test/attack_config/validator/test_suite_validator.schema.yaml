$schema: "http://json-schema.org/draft-07/schema#"
title: Validator pro WPA3 Test Suite
type: object

required: [ name, config_type, tests ]

properties:
  name:
    type: string
    description: "Name of test suite"
    pattern: '^[^\x00/]+$'
  suite_report_function:
    type: string
    description: "report function for all test after tests"
  wait_between_tests:
    type: integer
    minimum: 0
    description: "Seconds to wait between tests in the suite, ex: wait for rescue after attacks"
  config_type:
    type: string
    const: test_suite
    description: "Have to be test_suite"

  tests:
    type: object
    additionalProperties:
      oneOf:
        - title: Path source
          type: object
          required: [ path ]
          properties:
            path:
              type: string
          additionalProperties: false

        - title: Name source
          type: object
          required: [ test_name ]
          properties:
            test_name:
              type: string
          additionalProperties: false

        - title: Shuffle actor for get all data
          type: object
          required: [ type, config ]
          properties:
            type:
              enum: [ "actor_filler" ]
            config:
              type: string
              description: "path to config"

        - title: Generator source #include permutation
          type: object
          required: [ type, vars, config ]
          properties:
            type:
              enum: [ "generator", "permutation"]
            vars:
              type: object
              additionalProperties:
                type: array
                items:
                  type: [ string, number, boolean ]
            config:
              type: object
              description: "Structure of configuration with var_ prefix"
          additionalProperties: false

allOf:
  - $ref: './run_config.schema.yaml'