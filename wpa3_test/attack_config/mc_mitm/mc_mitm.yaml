$schema: http://json-schema.org/draft-07/schema#
name: mc_mitm_test
attacker_module: mc_mitm
actors:
  access_point:
    source: internal
    selection:
      condition: [AP]
      channel: 6
    setup:
      program: hostapd
      program_config:
        version: 2_10
        driver: nl80211
        ssid: mc_mitm_test
        hw_mode: g
        auth_algs: 1
        wpa: 2
        ieee80211n: 1
        ieee80211w: 2
        wpa_key_mgmt: SAE
        rsn_pairwise: CCMP
        wpa_passphrase: password123
        sae_password: password123
        channel: 6
    netns: ap
  client:
    source: internal
    selection:
      channel: 6
    setup:
      program: wpa_supplicant
      program_config:
        version: 2_10
        other_options: "-d"
        ssid: mc_mitm_test
        sae_password: password123
        ieee80211w: 2
        proto: RSN
        key_mgmt: SAE
        pairwise: CCMP
        group: CCMP
    netns: sta
    #sniff_iface: "client"
  rogue_client:
    source: internal
    selection:
      driver: mt76x2u
      condition: [ monitor, injection] #active_monitor
      channel: 6
  rogue_ap:
    source: internal
    selection:
      driver: mt76x2u
      condition: [ monitor, injection] # active_monitor
      channel: 1
observers:
  #client_mausezahn:
  #  actor: client
  #  program: mausezahn
  #  program_config:
  #    target_actor: access_point

  #client_tshark:
  #  actor: rogue_client
  #  program: tshark
  #  program_config:
  #    filter: "type mgt subtype beacon or type mgt subtype probe-req or type mgt subtype probe-resp or type mgt subtype auth or (type data and ether proto 0x888e)"

  channel1_tshark:
    actor: rogue_ap
    program: tshark
    program_config:
      filter: "type mgt subtype beacon or type mgt subtype probe-req or type mgt subtype probe-resp or type mgt subtype auth or type mgt subtype assoc-req or type mgt subtype assoc-resp or type mgt subtype reassoc-req or type mgt subtype reassoc-resp or (type data and ether proto 0x888e)"
  channel6_tshark:
    actor: rogue_client
    program: tshark
    program_config:
      filter: "type mgt subtype beacon or type mgt subtype probe-req or type mgt subtype probe-resp or type mgt subtype auth or type mgt subtype assoc-req or type mgt subtype assoc-resp or type mgt subtype reassoc-req or type mgt subtype reassoc-resp or (type data and ether proto 0x888e)"
attack_config:
  attack_time: 10