$schema: http://json-schema.org/draft-07/schema#
name: channel_switch_test
attacker_module: channel_switch
actors:
  access_point:
    source: internal
    selection:
      condition: [ AP ]
      channel: 6
    setup:
      program: hostapd
      program_config:
        driver: nl80211
        ssid: test_channel_switch
        hw_mode: g
        auth_algs: 1
        wpa: 2
        ieee80211n: 1
        ieee80211w: 2
        wpa_key_mgmt: SAE
        rsn_pairwise: CCMP
        wpa_passphrase: password123
        sae_password: password123
        channel: 6
    ip_addr: "10.0.0.1"
  client:
    source: internal
    selection:
      channel: 6
    setup:
      program: wpa_supplicant
      program_config:
        ssid: test_channel_switch
        sae_password: password123
        ieee80211w: 2
        proto: RSN
        key_mgmt: SAE
        pairwise: CCMP
        group: CCMP
    netns: sta
    ip_addr: "10.0.0.2"
  attacker:
    source: internal
    selection:
      driver: mt76x2u
      condition: [ monitor ]
      channel: 6
attack_config:
  #TODO try same channel like currect
  validator: ./channel_switch.schema.yaml
  attack_time: 30
  ms_interval: 100
  new_channel: 1
