$schema: http://json-schema.org/draft-07/schema#
name: bl0ck_BA_external
attacker_module: bl0ck
scan_iface: wlan1
actors:
  access_point:
    source: external
    selection:
      condition: [ AP, 80211ac, 5GHz ]
  client:
    source: external
    selection:
      condition: [ monitor, 80211ac, 5GHz ]
  attacker:
    source: internal
    selection:
      channel: 36
      condition: [ #injection, #TODO má tu být injection?
        monitor,
        5GHz ]
observers:
  att_tshark:
    actor: attacker
    program: tshark
    program_config:
      filter: "special_filter:actors"
  client_tshark:
    actor: client
    program: tshark
    program_config:
      filter: "special_filter:actors"
attack_config:
  attack_time_sec: 15
  attack_variant: "BA"
  random: false
  frame_in_batch: 50