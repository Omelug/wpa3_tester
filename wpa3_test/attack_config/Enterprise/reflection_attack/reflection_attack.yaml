$schema: http://json-schema.org/draft-07/schema#
name: reflection_attack
attacker_module: reflection_attack
actors:
  access_point:
    source: internal
    selection:
      channel: 6
      condition: [AP]
    setup:
      program: hostapd
      program_config:
        version: 2_7
        logger_syslog: -1
        logger_syslog_level: 2
        logger_stdout: -1
        logger_stdout_level: 2
        ctrl_interface: /var/run/hostapd
        ctrl_interface_group: 0
        ssid: dragonslayer
        hw_mode: g
        channel: 6
        beacon_int: 100
        dtim_period: 2
        max_num_sta: 255
        macaddr_acl: 0
        auth_algs: 1
        ignore_broadcast_ssid: 0
        wmm_enabled: 1
        wmm_ac_bk_cwmin: 4
        wmm_ac_bk_cwmax: 10
        wmm_ac_bk_aifs: 7
        wmm_ac_bk_txop_limit: 0
        wmm_ac_bk_acm: 0
        wmm_ac_be_aifs: 3
        wmm_ac_be_cwmin: 4
        wmm_ac_be_cwmax: 10
        wmm_ac_be_txop_limit: 0
        wmm_ac_be_acm: 0
        wmm_ac_vi_aifs: 2
        wmm_ac_vi_cwmin: 3
        wmm_ac_vi_cwmax: 4
        wmm_ac_vi_txop_limit: 94
        wmm_ac_vi_acm: 0
        wmm_ac_vo_aifs: 2
        wmm_ac_vo_cwmin: 2
        wmm_ac_vo_cwmax: 3
        wmm_ac_vo_txop_limit: 47
        wmm_ac_vo_acm: 0
        ieee8021x: 1
        eapol_key_index_workaround: 0
        eap_server: 1
        eap_user_file: hostapd.eap_user
        pwd_group: 19
        own_ip_addr: 127.0.0.1
        wpa: 2
        wpa_passphrase: secret passphrase
        wpa_key_mgmt: WPA-EAP
        rsn_pairwise: CCMP
    ip_addr: "10.0.0.1"
  client:
    source: internal
    setup:
      program: wpa_supplicant
      program_config:
        version: 2_10
        wpa_supplicant_path: "./valid_client.conf"
    selection:
      channel: 6
    netns: sta
    ip_addr: "10.0.0.2"
  attacker:
    source: internal
    selection:
      condition: [monitor]
      channel: 6