$schema: http://json-schema.org/draft-07/schema#
name: invalid_curve_attack
attacker_module: invalid_curve
actors:
  access_point:
    source: internal
    selection:
      channel: 6
      condition: [ AP ]
    setup:
      program: hostapd
      program_config:
        version: 2_7
        other_options: "-d"
        hostapd_path: "./config/hostapd.conf"
    ip_addr: "10.0.0.1"
  attacker:
    source: internal
    selection:
      driver: ath9k_htc
      condition: [ monitor, active_monitor ]
      channel: 6
observers:
  attacker_tshark:
    actor: attacker
    program: tshark
    program_config:
      filter: "special_filter:actors"
  ap_tshark:
    actor: access_point
    program: tshark
    program_config:
      filter: "special_filter:actors"

attack_config:
  identity: "bob"

rewrite: errors
