$schema: https://json-schema.org/draft/2020-12/schema
name: ap_info
$validator: "./ap_info.schema.yaml"
attacker_module: ap_info
scan_iface: wlan1
actors:
  target:
    source: external
    selection:
      #mac: "78:98:E8:55:3E:8D"
      permanent_mac: "24:ec:99:bf:c7:cf"
      channel: 6
  scanner:
    source: internal
    selection:
      condition: [ monitor ]
      channel: 6
    #sniff_iface: scanner

observers:
  tshark_client:
    actor: scanner
    program: tshark
    program_config:
      filter: "special_filter:actors"

attack_config:
  beacon_scan: true
  beacon_timeout_sec: 10
  EAP_scan: true
  ACM_trigger: true
  acm_trigger_count: 2560