$schema: http://json-schema.org/draft-07/schema#
name: wpa3_transition_downgrade
attacker_module: wpa3_trans_downgrade
actors:
  access_point:
    source: internal
    selection:
      condition: [ AP ]
      driver: rtw88_8821cu
    setup:
      program: hostapd
      program_config:
        driver: nl80211
        ssid: TestNetwork
        hw_mode: g
        channel: 6
        ieee80211n: 1
        ieee80211w: 2
        wpa: 2
        wpa_key_mgmt: SAE
        rsn_pairwise: CCMP
        sae_password: password123
    ip_addr: "10.0.0.1"
  client:
    source: internal
    selection:
      driver: rtl8xxxu
    setup:
      program: wpa_supplicant
      program_config:
        ssid: TestNetwork
        ieee80211w: 1
        proto: RSN
        key_mgmt: SAE WPA-PSK
        pairwise: CCMP
        group: CCMP
        sae_passphrase: password123
        wpa_passphrase: password123
    netns: sta
    ip_addr: "10.0.0.2"
  rogue_ap:
    source: internal
    selection:
      condition: [ AP ]
      #mac: "78:98:E8:55:3E:8D"
    setup:
      program: hostapd-mana
      program_config:
        # custom conf overrides the default hostapd-mana.conf - WPA2-PSK only, no SAE
        hostapd-mana_path: config/hostapd-mana.conf
  attacker:
    source: internal
    selection:
      condition: [ monitor ]
      channel: 6
observers:
  attacker_tshark:
    actor: attacker
    program: tshark
    program_config:
      filter: "special_filter:actors"
attack_config:
  # seconds to wait after legitimate AP is stopped for client to reconnect to rogue AP
  wait_after_stop: 30

rewrite: errors