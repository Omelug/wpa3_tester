$schema: "http://json-schema.org/draft-07/schema#"
title: Validator pro WPA3 Test Suite
type: object

required: [ name, config_type, tests ]

properties:
  name:
    type: string
    description: "Name of test suite"

  config_type:
    type: string
    const: test_suite
    description: "Have to be test_suite"

  tests:
    type: object
    additionalProperties:
      oneOf:
        - title: Path source
          type: object
          required: [ type, path ]
          properties:
            type:
              const: path
            path:
              type: string

        - title: Generator source #include permutation
          type: object
          required: [ type, vars, config ]
          properties:
            type:
              enum: [ "generator", "permutation" ]
            vars:
              type: object
              additionalProperties:
                type: array
                items:
                  type: [ string, number, boolean ]
            config:
              type: object
              description: "Structure of configuration with var_ prefix"

  deleted_old:
    type: boolean

  test_report:
    type: boolean

  rewrite:
    oneOf:
      - type: boolean
        const: false
      - type: string
        enum: [ errors, all ]

  compile_external:
    type: boolean

  install_req:
    type: boolean