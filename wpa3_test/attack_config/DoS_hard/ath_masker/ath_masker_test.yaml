$schema: http://json-schema.org/draft-07/schema#
name: ath_masker_test
attacker_module: ath_masker_test
validator: ./ath_masker_test.schema.yaml
actors:
  access_point:
    source: internal
    selection:
      condition: [ AP, 2_4GHz ]
      channel: 6
    setup:
      program: hostapd
      program_config:
        version: 2_10
        hostapd_path: "./simple_hostapd.conf"
    sniff_iface: ap
  attacker:
    source: internal
    setup:
      requirements: [ ath_masker ]
    selection:
      driver: ath9k_htc
      condition: [ monitor, control_monitor ]
      channel: 6
observers:
  tshark_client:
    actor: access_point
    program: tshark
    program_config:
      filter: "special_filter:actors_5_bytes"
  tshark_attacker:
    actor: attacker
    program: tshark
    program_config:
      filter: "special_filter:actors_5_bytes"
attack_config:
  # TODO validator
  test_mac_count: 100