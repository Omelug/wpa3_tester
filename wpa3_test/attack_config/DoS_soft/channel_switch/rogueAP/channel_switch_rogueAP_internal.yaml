$schema: http://json-schema.org/draft-07/schema#
name: channel_switch_rogueAP_internal
attacker_module: channel_switch
$validator: ../channel_switch.schema.yaml
actors:
  access_point:
    source: internal
    selection:
      condition: [ AP ]
      channel: 6
      driver: ath9k_htc
    setup:
      program: hostapd
      program_config:
        version: 2_11
        driver: nl80211
        ssid: test_channel_switch
        hw_mode: g
        auth_algs: 1
        wpa: 2
        ieee80211n: 1
        ieee80211w: 2
        wpa_key_mgmt: SAE
        rsn_pairwise: CCMP
        wpa_passphrase: password123
        sae_password: password123
        channel: 6
    ip_addr: "10.0.0.1"
  client:
    source: internal
    setup:
      program: wpa_supplicant
      program_config:
        version: 2_11
        ssid: test_channel_switch
        sae_password: password123
        ieee80211w: 1
        proto: RSN
        key_mgmt: SAE WPA-PSK
        psk: password123
        pairwise: CCMP
        group: CCMP
    selection:
      channel: 6
      driver: rtw88_8821au
    netns: sta
    ip_addr: "10.0.0.2"
  attacker:
    source: internal
    selection:
      channel: 6
      condition: [ monitor ]
      driver: mt76x2u
  rogue_ap:
    source: internal
    selection:
      channel: 1
      condition: [ monitor ]
    setup:
      program: hostapd-mana
      program_config:
        hostapd-mana_path: ./config/hostapd-mana.conf
$extends: ../observers.comp.yaml
attack_config:
  attack_time: 40
  ms_interval: 100
  new_channel: 1
