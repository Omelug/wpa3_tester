$schema: http://json-schema.org/draft-07/schema#
name: mc_mitm_test
attacker_module: mc_mitm

# TODO validator -> no sNIFF IFACES -> ap/MONITOR/MANGED ISSUES
actors:
  access_point:
    source: external
    selection:
      channel: 6
      whitebox_host: OpenWrt
      condition: [ AP, 2_4GHz ]
    setup:
      program: openwrt
      program_config:
        ssid: OpenWrt_2_4GHz
        channel: 6
        key: password123
        proto: RSN
        encryption: sae-mixed
        mode: ap
        htmode: HT20
        ieee80211w: 2
      req_programs: [ tcpdump ]
    ip_addr: "10.0.0.1"
    #
  client:
    source: internal
    selection:
      driver: rtw_8821cu
      channel: 6
    setup:
      program: wpa_supplicant
      program_config:
        group: CCMP
        ieee80211w: 2
        key_mgmt: SAE
        pairwise: CCMP
        proto: RSN
        sae_password: password123
        ssid: OpenWrt_2_4GHz
        version: 2_10
    netns: sta
    ip_addr: "10.0.0.2"

  rogue_client:
    source: internal
    selection:
      #FIXME rozdíl mezi původní a možnou mac
      #mac: "00:c0:ca:b7:69:2a" #FIXME I cant change channel on second mt76 adapter
      driver: mt76x2u
      condition: [ monitor ] #active_monitor
      channel: 6
  rogue_ap:
    source: internal
    selection:
      driver: mt76x2u
      #driver: ath9k_htc
      #condition: [ monitor, injection] # active_monitor
      channel: 1
observers: #(allow start_observers if uesd )
  #client_mausezahn:
  #  actor: client
  #  program: mausezahn
  #  program_config:
  #    target_actor: access_point

  #client_tshark:
  #  actor: client
  #  program: tshark
  #  program_config:
  #    filter: ""

  channel1_tshark:
    actor: rogue_ap
    program: tshark
    program_config:
      filter: ""

  channel6_tshark:
    actor: rogue_client
    program: tshark
    program_config:
      filter: ""
      #filter: "type mgt subtype beacon or type mgt subtype probe-req or type mgt subtype probe-resp or type mgt subtype auth or type mgt subtype assoc-req or type mgt subtype assoc-resp or type mgt subtype reassoc-req or type mgt subtype reassoc-resp"

attack_config:
  attack_time: 15
  target_ap_mac: 78:98:e8:55:3e:8d
  target_client_mac: a0:d7:68:10:25:6d
  ssid: OpenWrt_2_4GHz