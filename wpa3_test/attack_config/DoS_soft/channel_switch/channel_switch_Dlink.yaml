$schema: http://json-schema.org/draft-07/schema#
name: channel_switch_Dlink
attacker_module: channel_switch
actors:
  access_point:
    type: AP
    source: external
    selection:
      whitebox_host: OpenWrt
      condition: [AP]
    setup:
      program: openwrt
      program_config:
        validator: ../../validator/programs/openwrt.schema.yaml
        ssid: OpenWrt
        channel: 6
        key: password123
        proto: RSN
        encryption: sae-mixed
        mode: ap
        htmode: HT20
        # req_programs: [ tcpdump ]
    ip_addr: "10.0.0.1"
  client:
    type: STA
    source: internal
    setup:
      program: wpa_supplicant
      program_config:
        version: 2_10
        ssid: OpenWrt
        sae_password: password123
        ieee80211w: 2
        proto: RSN
        key_mgmt: SAE
        pairwise: CCMP
        group: CCMP
    channel: 1
    netns: sta
    ip_addr: "10.0.0.2"
  attacker:
    type: STA
    source: internal
    selection:
      driver: mt76x2u
      condition: [monitor]
    channel: 6

attack_config:
  validator: ./channel_switch.schema.yaml
  attack_time: 30
  ms_interval: 100
  new_channel: 1

install_req: true
