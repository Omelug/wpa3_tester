$schema: https://json-schema.org/draft/2020-12/schema
title: Cookie guzzler Config
type: object
required:
  - actors
  - attack_config
properties:
  actors:
    required:
      - access_point
      - client
      - attacker
  attack_config:
    type: object
    required:
      - attack_time_sec
      - burst_size
    additionalProperties: false
    properties:
      attack_time_sec:
        type: integer
        description: time of sending cookie guzzler packets
        minimum: 1
      regeneration_time_sec:
        type: integer
        default: 0
      burst_size:
        type: integer
      packets_per_second_limit:
        type: integer
        default: 99999999999
