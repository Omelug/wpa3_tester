$schema: https://json-schema.org/draft/2020-12/schema
title: Config for dragondrain wrapper
type: object
required:
  - actors
  - attack_config
properties:
  actors:
    required:
      - access_point
      - client
      - attacker
  attack_config:
    type: object
    additionalProperties: false
    properties:
      bitrate:
        type: integer
        default: 54
      number_of_random_mac:
        type: integer
        description: number of generated mac addresses what are used for attack
        default: 1
      timeout_sec:
        type: integer
        description: attack time (dragondrain)
        default: 30
      r:
        type: integer
        default: 200
      interval:
        type: integer
      #g:
      #  type: integer
      #  description: group, only P-521, has to be checked
      #  enum: [21, ]

