name: var generator
config_type: test_suite
tests:
  driver_perm:
    type: permutation
    vars:
      driver: [ "driver1", "driver2", "driver3" ]
      mode: [ "2_4GHz", "5GHz" ]
    config:
      extends: 03_test.yaml
      actors:
        acces_point:
          selection:
            driver: var_driver_0
        client:
          selection:
            driver: var_driver_1
        attacker:
          selection:
            condition: [ var_mode_0 ]