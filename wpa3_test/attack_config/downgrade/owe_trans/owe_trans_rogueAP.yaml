$schema: https://json-schema.org/draft/2020-12/schema
$extends: owe_trans.yaml
name: owe_transition_probe_leak_rogueAP
actors:
  rogue_ap:
    source: internal
    selection:
      condition: [ AP ]
      mac: "78:98:E8:55:3E:8D" #FIXME
    setup:
      program: hostapd
      program_config:
        driver: nl80211
        ssid: test_owe
        hw_mode: g
        channel: 6
        ieee80211n: 1
        ieee80211w: 2
        wpa: 2
        wpa_key_mgmt: OWE
        rsn_pairwise: CCMP
observers:
  rogue_ap_tshark:
    actor: rogue_ap
    program: tshark
    program_config:
      filter: "special_filter:actors"
