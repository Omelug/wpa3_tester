$schema: https://json-schema.org/draft/2020-12/schema
name: channel_switch_rogueAP_same_channel
attacker_module: channel_switch
$validator: ../channel_switch.schema.yaml
$extends: ./CSA_rogueAP_internal.yaml
actors:
  rogue_ap:
    source: internal
    selection:
      channel: 6
      condition: [ AP ]
    setup:
      program: hostapd-mana
      program_config:
        channel: 6
        hostapd-mana_path: ./config/hostapd-mana.conf

attack_config:
  attack_time: 15
  ms_interval: 100
  new_channel: 6
