$schema: http://json-schema.org/draft-07/schema#
name: channel_switch_Dlink
attacker_module: channel_switch
actors:
  access_point:
    source: external
    selection:
      whitebox_host: OpenWrt
      condition: [AP, 2_4GHz]
    setup:
      program: openwrt
      program_config:
        validator: ../../validator/programs/openwrt.schema.yaml
        ssid: OpenWrt_2_4GHz
        channel: 6
        key: password123
        proto: RSN
        encryption: sae-mixed
        mode: ap
        htmode: HT20
      channel: 6
      req_programs: [ tcpdump ]
    ip_addr: "10.0.0.1"
  client:
    source: internal
    selection:
      condition: [ monitor ]
    setup:
      program: wpa_supplicant
      program_config:
        version: 2_10
        ssid: OpenWrt_2_4GHz
        sae_password: password123
        ieee80211w: 2
        proto: RSN
        key_mgmt: SAE
        pairwise: CCMP
        group: CCMP
    channel: 6
    netns: sta
    ip_addr: "10.0.0.2"
  attacker:
    source: internal
    selection:
      driver: mt76x2u
      condition: [monitor]
    channel: 6

attack_config:
  validator: ./channel_switch.schema.yaml
  attack_time: 30
  ms_interval: 100
  new_channel: 1

install_req: true
