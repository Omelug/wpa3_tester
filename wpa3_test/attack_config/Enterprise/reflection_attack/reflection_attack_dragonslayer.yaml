$schema: http://json-schema.org/draft-07/schema#
name: reflection_attack_gragonslayer
attacker_module: reflection_attack
actors:
  access_point:
    source: internal
    selection:
      channel: 6
      condition: [ AP ]
    setup:
      program: hostapd
      program_config:
        version: 2_7
        hostapd_path: "./config/hostapd.conf"
  client:
    source: internal
    setup:
      program: wpa_supplicant
      program_config:
        version: 2_10
        wpa_supplicant_path: "./config/valid_client.conf"
    selection:
      channel: 6
    netns: sta
  attacker:
    source: internal
    selection:
      condition: [ monitor ]
      channel: 6
attack_config:
  target_type: sta