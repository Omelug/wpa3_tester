$schema: "http://json-schema.org/draft-07/schema#"
name: hostapd_versions_ts
config_type: test_suite
tests:
  hostapd_SAE_PMF_fix:
    test_name: channel_switch_2_9
  hostapd_2_10_ocv:
    test_name: channel_switch_2_10_ocv
  hostapd_2_10_ocv_beacon_prot:
    test_name: channel_switch_2_10_ocv_beacon_prot
  hostapd_gen:
    type: generator
    vars:
      hostapd: [ 2_10, 2_11 ]
    config:
      $extends: ../channel_switch.yaml
      name: channel_switch_var_hostapd
      actors:
        access_point:
          setup:
            program: hostapd
            program_config:
              version: var_hostapd
        client:
          setup:
            program: wpa_supplicant
            program_config:
              version: var_hostapd

delete_old: true
rewrite: "errors"
compile_external: true
install_req: true