$schema: https://json-schema.org/draft/2020-12/schema
name: reflection_attack
attacker_module: reflection_attack
actors:
  access_point:
    source: internal
    selection:
      channel: 6
      condition: [ AP ]
    setup:
      program: hostapd
      program_config:
        version: 2_7
        other_options: "-d" #FIXME hostapd_path
        hostapd_path: "./config/hostapd.conf"
  # TODO po deugu odstranit, pokud není potřba
  client:
    source: internal
    setup:
      program: wpa_supplicant
      program_config:
        version: 2_10
        wpa_supplicant_path: "./config/valid_client.conf"
    selection:
      channel: 6
    netns: sta
  attacker:
    source: internal
    selection:
      condition: [ monitor ] #, active_monitor ]
      channel: 6
    netns: att
observers:
  attacker_tshark:
    actor: attacker
    program: tshark
    program_config:
      #filter: ""
      filter: "special_filter:actors"
  ap_tshark:
    actor: access_point
    program: tshark
    program_config:
      filter: "special_filter:actors"

attack_config: # TODO validation
  identity: bob

rewrite: errors
delete_old: true