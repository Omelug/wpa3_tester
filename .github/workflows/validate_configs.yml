name: Validate attack configs

on:
  push:
    branches: [main]
    paths:
      - 'wpa3_test/attack_config/**'
      - 'wpa3_test/src/setup/**'
      - 'tests/setup/**'

jobs:
  validate:
    runs-on:  ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - uses: ./.github/actions/setup-deps
        with:
          cache-suffix: validate

      - name: Configure
        run: cmake -S wpa3_test -B build -G Ninja

      - name: Build validation tests
        run: cmake --build build --target run_validation_tests -j$(nproc)

      - name: Run config validation
        run: ctest --test-dir build -R ValidationTests --output-on-failure
