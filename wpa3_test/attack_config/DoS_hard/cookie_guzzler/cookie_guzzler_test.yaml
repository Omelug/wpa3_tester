$schema: http://json-schema.org/draft-07/schema#
name: cookie_guzzler
validator: cookie_guzzler.schema.yaml
attacker_module: cookie_guzzler
actors:
  access_point:
    source: external
    selection:
      whitebox_host: OpenWrt
      condition: [ AP, 2_4GHz ]
      channel: 6
    setup:
      program: openwrt
      program_config:
        ssid: OpenWrt_2_4GHz
        channel: 6
        key: password123
        proto: RSN
        encryption: sae-mixed
        mode: ap
        htmode: HT20
      req_programs: [ tcpdump ]
    ip_addr: "10.0.0.1"
  client:
    source: internal
    setup:
      program: wpa_supplicant
      program_config:
        ssid: OpenWrt_2_4GHz
        sae_password: password123
        ieee80211w: 2
        proto: RSN
        key_mgmt: SAE
        pairwise: CCMP
        group: CCMP
    netns: sta
    ip_addr: "10.0.0.2"
    sniff_iface: client
  attacker:
    source: internal
    selection:
      condition: [monitor, injection]
      driver: ath9k_htc
      channel: 6
    sniff_iface: att
