$schema: "http://json-schema.org/draft-07/schema#"
title: Hostapd program
type: object
properties:
  $validator:
    type: string
  hostapd_path:
    type: string
    description: relative path from final config to config
  other_options:
    type: string
    description: arguments for program
  openssl:
    type: string
    pattern: "^OpenSSL_[a-zA-Z0-9_]+$"
    description: OpenSSL version tag (e.g. OpenSSL_1_0_2f)
additionalProperties: true
