name: Tests

on:
  push:
    branches: [main]
jobs:
  test:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - uses: ./.github/actions/setup-deps
        with:
          cache-suffix: test

      - name: Configure
        env:
          CC: clang-18
          CXX: clang++-18
        run: cmake -S wpa3_test -B build -G Ninja

      - name: Build all tests
        run: cmake --build build -j$(nproc)

      # Tests excluded from CI: require real WiFi hardware.
      # Run locally with: sudo -E ctest --test-dir build --output-on-failure
      - name: Run tests
        run: sudo -E ctest --test-dir build --output-on-failure
