$schema: http://json-schema.org/draft-07/schema#
name: bl0ck
attacker_module: bl0ck
ignore_interfaces: [wlan0] #FIXME  move to global_config
actors:
  access_point:
    type: AP
    source: internal
    selection:
      condition: [AP]
    setup:
      program: hostapd
      program_config:
        driver: nl80211
        ssid: wpa3_tester_AP
        hw_mode: g
        auth_algs: 1
        wpa: 2
        ieee80211n: 1
        ieee80211w: 2
        wpa_key_mgmt: SAE
        rsn_pairwise: CCMP
        wpa_passphrase: password123
        channel: 6
      channel: 6
    ip_addr: "10.0.0.1"
  client:
    type: STA
    source: internal
    setup:
      program: wpa_supplicant
      program_config:
        ssid: wpa3_tester_AP
        sae_password: password123
        ieee80211w: 2
        proto: RSN
        key_mgmt: SAE
        pairwise: CCMP
        group: CCMP
      channel: 6
    netns: sta
    ip_addr: "10.0.0.2"
  attacker:
    type: STA
    source: internal
    selection:
      condition: [monitor]
    channel: 6
