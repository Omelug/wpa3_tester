$schema: https://json-schema.org/draft/2020-12/schema
title: Cookie guzzler Config
type: object
required:
  - actors
  - attack_config
properties:
  actors:
    required:
      - access_point
      - client
      - attacker
  attack_config:
    type: object
    required:
      - attack_time_sec
      - acm_trigger_count
    additionalProperties: false
    properties:
      attack_time_sec:
        type: integer
        description: time of sending cookie guzzler packets
        minimum: 1
      acm_trigger_count:
        type: integer
        minimum: 0
      burst_size:
        type: integer
        minimum: 1
      cookie_wait_ms:
        type: integer
        minimum: 0
      packets_per_second_limit:
        type: integer
        minimum: 1

