name: Tests (Nix)

on:
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' \
            | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm
          ls -la /dev/kvm

      - uses: cachix/install-nix-action@v31
        with:
          nix_path: nixpkgs=channel:nixos-unstable
          extra_nix_config: |
            extra-system-features = kvm nixos-test
            extra-sandbox-paths = /dev/kvm

      - name: Cache Nix store
        uses: actions/cache@v4
        with:
          path: /nix/store
          key: nix-${{ runner.os }}-${{ hashFiles('tester_setup/shell.nix') }}
          restore-keys: nix-${{ runner.os }}-

      - name: Cache FetchContent deps
        uses: actions/cache@v4
        with:
          path: /tmp/wpa3-deps
          key: fetchcontent-${{ runner.os }}-${{ hashFiles('wpa3_test/cmake/external_libs.cmake') }}
          restore-keys: fetchcontent-${{ runner.os }}-

      - name: Pre-fetch cmake deps
        run: |
          nix-shell tester_setup/shell.nix --run \
            'cmake -S wpa3_test -B /tmp/wpa3-prefetch
             -DFETCHCONTENT_BASE_DIR=/tmp/wpa3-deps
             2>&1 | grep -E "(Fetch|Clone|Download|already)" || true'

      - name: Run hwsim tests in NixOS VM
        run: nix build --impure .#checks.x86_64-linux.hwsim
        env:
          GITHUB_WORKSPACE: ${{ github.workspace }}
          WPATESTER_DEPS_DIR: /tmp/wpa3-deps

      - name: Run other tests
        run: |
          nix-shell tester_setup/shell.nix --run \
            'cmake -S wpa3_test -B build -G Ninja
             -DFETCHCONTENT_BASE_DIR=/tmp/wpa3-deps
             -DFETCHCONTENT_FULLY_DISCONNECTED=ON &&
             cmake --build build -j$(nproc) &&
             sudo -E ctest --test-dir build --output-on-failure --exclude-regex HwsimTests'
