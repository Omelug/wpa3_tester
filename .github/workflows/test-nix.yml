name: Tests (Nix)

on:
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - uses: cachix/install-nix-action@v31
        with:
          nix_path: nixpkgs=channel:nixos-unstable

      - name: Cache Nix store
        uses: actions/cache@v4
        with:
          path: /nix/store
          key: nix-${{ runner.os }}-${{ hashFiles('tester_setup/shell.nix') }}
          restore-keys: nix-${{ runner.os }}-

      - name: Configure
        run: |
          nix-shell tester_setup/shell.nix --run \
            'cmake -S wpa3_test -B build -G Ninja'

      - name: Build all tests
        run: |
          nix-shell tester_setup/shell.nix --run \
            'cmake --build build -j$(nproc)'

      - name: Run tests
        run: |
          nix-shell tester_setup/shell.nix --run \
            'sudo -E ctest --test-dir build --output-on-failure'
