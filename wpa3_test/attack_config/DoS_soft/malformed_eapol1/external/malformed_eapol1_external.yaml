$schema: https://json-schema.org/draft/2020-12/schema
name: malformed_eapol1_Dlink
attacker_module: malformed_eapol1
actors:
  access_point:
    $extends: ../../../target/Dlink/Dlink_wb.comp.yaml
  client:
    source: internal
    setup:
      program: wpa_supplicant
      program_config:
        ssid: OpenWrt_2_4GHz
        sae_password: password123
        ieee80211w: 2
        proto: RSN
        key_mgmt: SAE
        pairwise: CCMP
        group: CCMP
        version: 2_10
    selection:
      channel: 6
    ip_addr: "10.0.0.2"
  attacker:
    source: internal
    selection:
      driver: mt76x2u
      condition: [ monitor ]
      channel: 6
observers:
  mz_gen:
    actor: client
    program: mausezahn
    program_config:
      target_actor: access_point
  client_tshark:
    actor: client
    program: tshark
    program_config:
      filter: "udp port 5201"
  ap_tshark:
    actor: access_point
    program: tshark
    program_config:
      filter: "udp port 5201"