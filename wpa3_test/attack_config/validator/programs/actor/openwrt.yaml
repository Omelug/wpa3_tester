$schema: "http://json-schema.org/draft-07/schema#"
title: OpenWrt AP program_config
type: object
# TODO vygenerovane, zkontrolovat v dokumentaci openwrt
properties:
  validator:
    type: string
  # --- basic ---
  ssid:
    type: string
    minLength: 1
    maxLength: 32
    default: OpenWrt
  mode:
    type: string
    enum: [ ap, sta, monitor, adhoc, mesh ]
    default: ap
  hidden:
    type: boolean
  disabled:
    type: boolean
  macaddr:
    type: string
    pattern: "^([0-9A-Fa-f]{2}:){5}[0-9A-Fa-f]{2}$"

  # --- radio ---
  channel:
    oneOf:
      - type: integer
        minimum: 1
        maximum: 196
      - type: string
        enum: [ auto ]
  htmode:
    type: string
    enum: [ HT20, HT40, HT40+, HT40-, VHT20, VHT40, VHT80, VHT160, HE20, HE40, HE80, HE160, EHT20, EHT40, EHT80, EHT160, EHT320 ]
  txpower:
    type: integer
    minimum: 0
    maximum: 30
  country:
    type: string
    minLength: 2
    maxLength: 2
  beacon_int:
    type: integer
    minimum: 15
    maximum: 65535
  noscan:
    type: boolean

  # --- security ---
  proto:
    type: string
    enum: [ RSN, WPA, WPA2, WPA3, none ]
  encryption:
    type: string
    enum: [ none, psk, psk2, psk-mixed, sae, sae-mixed, owe, wep, ccmp, tkip ]
    default: none
  key:
    type: string
    minLength: 8
    maxLength: 63

  # --- PMF (Protected Management Frames) ---
  ieee80211w:
    type: integer
    enum: [ 0, 1, 2 ]
    description: "0=disabled, 1=optional, 2=required (WPA3)"
    default: 1
  # --- WPA3 SAE ---
  sae_pwe:
    type: integer
    enum: [ 0, 1, 2, 3 ]
    description: "0=hunt-and-peck, 1=H2E, 2=H2E required, 3=both"
  sae_password:
    type: string
    minLength: 1
  auth_cache:
    type: boolean

  # --- OCV (Operating Channel Validation) ---
  ocv:
    type: boolean
    description: "Operating Channel Validation - verifies communication on correct channel"

  # --- roaming (802.11r) ---
  ieee80211r:
    type: boolean
  mobility_domain:
    type: string
    pattern: "^[0-9A-Fa-f]{4}$"
  ft_over_ds:
    type: boolean
  ft_psk_generate_local:
    type: boolean
  reassociation_deadline:
    type: integer
    minimum: 1000
    maximum: 65535

  # --- 802.11k/v ---
  ieee80211k:
    type: boolean
  ieee80211v:
    type: boolean
  wnm_sleep_mode:
    type: boolean

  # --- client management ---
  isolate:
    type: boolean
  max_inactivity:
    type: integer
    minimum: 0
  disassoc_low_ack:
    type: boolean
  multicast_to_unicast:
    type: boolean
  wds:
    type: boolean

  # --- WPA Enterprise ---
  auth_server:
    type: string
  auth_port:
    type: integer
    minimum: 1
    maximum: 65535
  auth_secret:
    type: string
  acct_server:
    type: string
  acct_port:
    type: integer
    minimum: 1
    maximum: 65535

  # --- mesh ---
  mesh_id:
    type: string
  mesh_fwding:
    type: boolean
  mesh_rssi_threshold:
    type: integer
    minimum: -255
    maximum: 0
  # ---------
  network:
    type: string
    default: lan
required: [ ssid, mode ]
if:
  properties:
    encryption:
      enum: [ psk, psk2, psk-mixed, sae, sae-mixed ]
then:
  required: [ key ]

additionalProperties: false
