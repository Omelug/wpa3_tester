$schema: http://json-schema.org/draft-07/schema#
name: bl0ck
attacker_module: bl0ck
config_type: component
actors:
  access_point:

    source: internal
    selection:
      condition: [AP, 80211ac]
    setup:
      program: hostapd
      program_config:
        driver: nl80211
        hw_mode: a
        ssid: wpa3_tester_AP
        #auth_algs: 1
        wpa: 2
        ieee80211n: 1
        ieee80211ac: 1
        ieee80211w: 2
        wpa_key_mgmt: SAE
        rsn_pairwise: CCMP
        sae_password: password123
        channel: 36
        vht_oper_chwidth: 0
        #vht_oper_centr_freq_seg0_idx: 42
    ip_addr: "10.0.0.1"
  client:

    source: internal
    setup:
      program: wpa_supplicant
      program_config:
        ssid: wpa3_tester_AP
        #sae_password: password123
        ieee80211w: 2
        #proto: RSN
        key_mgmt: SAE
        psk: "\"password123\""
        pairwise: CCMP
        group: CCMP
        scan_freq: 5180        # channel 36 = 5180 MHz
        freq_list: 5180        # scan
    channel: 36
    selection:
      condition: [monitor, 80211ac]
    netns: sta
    ip_addr: "10.0.0.2"
    sniff_iface: client_mon
  attacker:

    source: internal
    selection:
      condition: [monitor, injection]
    channel: 36
