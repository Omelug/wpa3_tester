$schema: https://json-schema.org/draft/2020-12/schema
title: Channel Switch Attack Config
type: object
required:
  - actors
properties:
  actors:
    required:
      - access_point
      - client
      - attacker
    properties:
      rogue_ap:
        description: "Optionally to actually get client to Mitm"
  attack_config:
    required:
      - attack_time
      - ms_interval
      - new_channel
    additionalProperties: false
    properties:
      $validator:
        type: string
        description: path to this schema
      attack_time:
        type: integer
        description: time of sending channel switch packets
        minimum: 1
      ms_interval:
        type: integer
        description: repeating interval of sending CSA
        minimum: 1
      new_channel:
        type: integer
        description: New channel to switch
