$schema: https://json-schema.org/draft/2020-12/schema
name: bl0ck
attacker_module: bl0ck

#requirements:
#  two_iface:
#    injection_more_fragments_spoofed: [transceiver, receiver]
#    injection_more_fragments_valid: [transceiver, receiver]
#    injection_fields_order_spoofed: [transceiver, receiver]
#    injection_fields_order_valid: [transceiver, receiver]

actors:
  access_point:
    source: internal
    selection:
      condition: [ AP, 80211ac, 5GHz ]
    setup:
      program: hostapd
      program_config:
        channel: 36
        driver: nl80211
        hw_mode: a
        ieee80211ac: 1
        ieee80211n: 1
        ieee80211w: 2
        rsn_pairwise: CCMP
        sae_password: password123
        ssid: wpa3_tester_AP
        version: 2_10
        vht_oper_chwidth: 0
        wpa: 2
        wpa_key_mgmt: SAE
    ip_addr: "10.0.0.1"
  client:
    source: internal
    setup:
      program: wpa_supplicant
      program_config:
        freq_list: 5180
        group: CCMP
        ieee80211w: 2
        key_mgmt: SAE
        pairwise: CCMP
        psk: password123
        #sae_password: password123
        scan_freq: 5180
        ssid: wpa3_tester_AP
        version: 2_10
    selection:
      channel: 36
      condition: [ monitor, 80211ac, 5GHz ]
    netns: sta
    ip_addr: "10.0.0.2"
    sniff_iface: client_mon
  attacker:
    source: internal
    selection:
      channel: 36
      condition: [ #injection, #TODO má tu být injection?
        monitor,
        5GHz ]
observers:
  ap_mausezahn:
    actor: access_point
    program: mausezahn
    program_config:
      target_actor: client
  att_tshark:
    actor: attacker
    program: tshark
    program_config:
      filter: "special_filter:actors"
  client_tshark:
    actor: client
    program: tshark
    program_config:
      filter: "special_filter:actors"