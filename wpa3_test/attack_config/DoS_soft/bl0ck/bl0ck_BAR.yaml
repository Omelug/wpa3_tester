$schema: http://json-schema.org/draft-07/schema#
name: bl0ck_BAR
attacker_module: bl0ck
attack_config:
  validator: ./bl0ck.schema.yaml
  attack_time_sec: 15
  attack_variant: "BAR"
  random: false
  frame_number: 50
actors:
  access_point:
    source: internal
    selection:
      driver: mt76x2u
      condition: [ AP, 80211ac, 5GHz]
    setup:
      program: hostapd
      program_config:
        version: 2_10
        hostapd_path: "./config/valid_hostapd.conf"
    ip_addr: "10.0.0.1"
  client:
    source: internal
    setup:
      program: wpa_supplicant
      program_config:
        version: 2_10
        wpa_supplicant_path: "./config/valid_client.conf"
    selection:
      driver: mt76x2u
      channel: 36
      condition: [ monitor, 80211ac, 5GHz]
    netns: sta
    ip_addr: "10.0.0.2"
    sniff_iface: client_mon
  attacker:
    source: internal
    selection:
      channel: 36
      condition: [ monitor, injection, 5GHz]