$schema: http://json-schema.org/draft-07/schema#
title: External info scan config
type: object
required:
  - actors
  - attack_config
properties:
  actors:
    required:
      - scanner
  attack_config:
    type: object
    additionalProperties: false
    properties:
      timeout_sec:
        type: integer
        minimum: 1
      actor_limit:
        type: integer
        minimum: 0
      actor_filter:
        $ref: '../../validator/test_validator.schema.yaml#/definitions/Actor'
