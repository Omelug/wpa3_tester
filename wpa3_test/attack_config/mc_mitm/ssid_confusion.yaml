$schema: http://json-schema.org/draft-07/schema#
name: ssid_confusion_test
attacker_module: ssid_confusion
actors:
  access_point:
    source: internal
    selection:
      condition: [ AP ]
      channel: 6
    setup:
      program: hostapd
      program_config:
        version: 2_10
        driver: nl80211
        ssid: SafeNet
        hw_mode: g
        auth_algs: 1
        wpa: 2
        ieee80211n: 1
        ieee80211w: 2
        wpa_key_mgmt: SAE
        rsn_pairwise: CCMP
        wpa_passphrase: password123
        sae_password: password123
        channel: 6
    ip_addr: "10.0.0.1"
  client:
    source: internal
    selection:
      channel: 6
    setup:
      program: wpa_supplicant
      program_config:
        version: 2_10
        ssid: SafeNet
        sae_password: password123
        ieee80211w: 2
        proto: RSN
        key_mgmt: SAE
        pairwise: CCMP
        group: CCMP
    netns: sta
    ip_addr: "10.0.0.2"
  rogue_client:
    source: internal
    selection:
      driver: mt76x2u
      condition: [ monitor, injection ]
      channel: 6
    sniff_iface: "att_real"
  rogue_ap:
    source: internal
    selection:
      condition: [ AP, monitor, injection ]
      channel: 1
    sniff_iface: "att_rogue"
attack_config:
  # SSID the rogue AP will advertise — should match a network the client auto-connects to
  confused_ssid: "FreeWiFi"
  # Strip RSN IE from the rogue beacon so the network appears open (no WPA3)
  strip_rsn: true
  attack_time_sec: 30
observers:
  rogue_tshark:
    actor: rogue_ap
    program: tshark
    program_config:
      filter: "type mgt subtype beacon or type mgt subtype auth or type mgt subtype assoc-req"