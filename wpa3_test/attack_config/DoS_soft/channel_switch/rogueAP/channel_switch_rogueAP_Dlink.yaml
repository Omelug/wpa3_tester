$schema: http://json-schema.org/draft-07/schema#
name: channel_switch_rogueAP_Dlink
attacker_module: channel_switch
actors:
  access_point:
    source: external
    selection:
      whitebox_host: OpenWrt
      channel: 6
      condition: [ AP, 2_4GHz ]
    setup:
      program: openwrt
      program_config:
        ssid: test_channel_switch
        channel: 6
        key: password123
        proto: RSN
        encryption: sae-mixed
        mode: ap
        htmode: HT20
      req_programs: [ tcpdump ]
    ip_addr: "10.0.0.1"
  client:
    source: internal
    setup:
      program: wpa_supplicant
      program_config:
        version: 2_11
        ssid: test_channel_switch
        sae_password: password123
        ieee80211w: 1
        proto: RSN
        key_mgmt: SAE WPA-PSK
        psk: password123
        pairwise: CCMP
        group: CCMP
    selection:
      channel: 6
    netns: sta
    ip_addr: "10.0.0.2"
  attacker:
    source: internal
    selection:
      driver: mt76x2u
      condition: [ monitor ]
      channel: 6
  rogue_ap:
    source: internal
    selection:
      channel: 1
      driver: mt76x2u
      condition: [ monitor ]
    setup:
      program: hostapd-mana
      program_config:
        hostapd-mana_path: ./hostapd-mana.conf
attack_config:
  validator: ../channel_switch.schema.yaml
  attack_time: 180
  ms_interval: 100
  new_channel: 1
