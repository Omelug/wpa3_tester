$schema: http://json-schema.org/draft-07/schema#
name: channel_switch_rogueAP_external
attacker_module: channel_switch
$validator: ../channel_switch.schema.yaml
actors:
  access_point:
    source: external
    selection:
      condition: [ AP ]
      channel: 6
      ssid: test_channel_switch
  client:
    source: external
    selection:
      channel: 6
  attacker:
    source: internal
    selection:
      channel: 6
      condition: [ monitor ]
      driver: mt76x2u
  rogue_ap:
    source: internal
    selection:
      channel: 1
      condition: [ AP ]
    setup:
      program: hostapd-mana
      program_config:
        hostapd-mana_path: ./config/hostapd-mana.conf
$extends: ../observers.comp.yaml
attack_config:
  attack_time: 60
  ms_interval: 100
  new_channel: 1
