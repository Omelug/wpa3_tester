name: Setup build dependencies
description: Install apt packages and restore build caches

inputs:
  cache-suffix:
    description: Suffix for ccache key to separate validate vs test caches
    required: true

runs:
  using: composite
  steps:
    - name: Install dependencies
      shell: bash
      run: |
        sudo apt-get update -q
        sudo apt-get install -y \
          cmake ninja-build ccache mold \
          pkg-config \
          libnl-3-dev libnl-genl-3-dev \
          libssl-dev \
          libssh-dev \
          libyaml-cpp-dev \
          libtins-dev \
          flex bison

    - name: Cache FetchContent deps
      uses: actions/cache@v4
      with:
        path: build/_deps
        key: deps-${{ runner.os }}-${{ hashFiles('wpa3_test/cmake/external_libs.cmake') }}
        restore-keys: deps-${{ runner.os }}-

    - name: Cache ccache
      uses: actions/cache@v4
      with:
        path: ~/.cache/ccache
        key: ccache-${{ runner.os }}-${{ inputs.cache-suffix }}-${{ github.sha }}
        restore-keys: ccache-${{ runner.os }}-${{ inputs.cache-suffix }}-
