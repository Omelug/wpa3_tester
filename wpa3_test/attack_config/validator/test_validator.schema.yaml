$schema: http://json-schema.org/draft-07/schema#
title: Test Configuration Schema
type: object
required:
  - name
  - attacker_module
  - actors
  # - observers
  #- attack_config
config_type:
  type: string
  const: test
  description: "Have to be test or not included"
properties:
  extends:
    type: string
    description: Path to the parent YAML template
  name:
    type: string
    description: Test name
# add NOT_interface
#  wizard_fallback:
#    type: boolean
#    description: If should be wizard asked after selection error

  attacker_module:
    type: string
    description: Name of attacker_module

  actors:
    type: object
    description: Test actors definitions
    minProperties: 1
    additionalProperties:
      $ref: '#/definitions/Actor'
  scan_iface:
    type: string
    description: Interface to scan when source is external

  if:
    properties:
      actors:
        additionalProperties:
          properties:
            type:
              const: external
          required: [ type ]
          not:
            anyOf:
              - required: [ whitebox_ip ]
              - required: [ whitebox_host ]
    required: [ actors ]
  then:
    required: [ scan_iface ]

  attack_config:
    type: object
    description: test/attack parameters
    properties:
      validator:
        type: string
        description: validator

  compile_external:
    type: boolean
    default: false

  install_req:
    type: boolean
    default: false

definitions:
  Actor:
    type: object
    additionalProperties: false
    required:
      - type
      - source
    properties:
      type:
        type: string
        enum: ["AP", "STA", "process"]
        description: Access point
      source:
        type: string
        enum: ["simulation","internal", "external"]
        description: mac_hwsim, internal, external
      netns:
        type: string
        description: Namespace to isolate AP/STA for iperf3 etc. observation
      ip_addr:
        type: string
        # Regex pro IPv4 (0.0.0.0 až 255.255.255.255)
        pattern: '^((25[0-5]|(2[0-4]|1\d|[1-9]|)\d)\.?\b){4}$'
        description: Static IP address for the actor (e.g., 192.168.1.1)
      channel:
        type: integer
      setup:
        type: object
        additionalProperties: false
        properties:
          channel:
            type: integer
          program:
            type: string
            enum: [ "hostapd", "wpa_supplicant", "iperf3", "openwrt"]
          program_config:
            type: object
            description: Configuration for the program (hostapd.conf, wpa_supplicant.conf, etc.)
      selection:
        type: object
        additionalProperties: false
        properties:
          whitebox_ip:
            type: string
          whitebox_host:
            type: string
            description: hostname
          mac:
            type: string
            pattern: '^[0-9A-Fa-f]{2}(:[0-9A-Fa-f]{2}){5}$'
            description: MAC address in format AA:BB:CC:DD:EE:FF
          essid:
            type: string
            description: Name of AP
          iface:
            type: string
            description: Name of interface
          driver:
            type: string
            description: driver of wifi card
          condition:
            type: array
            items:
              type: string
              enum: ["AP", "injection", "monitor", "2_4GHz", "5GHz", "WPA-PSK", "WPA3-SAE", "80211n","80211ac", "80211ax"]
            minItems: 1
            description: Condition for selection
        minProperties: 1
      sniff_iface:
        type: string
        description: Name of interface for monitoring (will create like associated on iface in selection)
    # Validation rules
    allOf:
      # netns can only be used with source: internal
      - if:
          required: [ netns ]
        then:
          properties:
            source:
              const: internal
          required: [ source ]
          errorMessage: "netns can only be used with source: internal"
      # whitebox_ip/whitebox_host not allowed if not external
      - if:
          not:
            properties:
              source:
                const: external
            required: [ source ]
        then:
          not:
            anyOf:
              - required: [ whitebox_ip ]
              - required: [ whitebox_host ]
              - required: [ external_OS ]
          errorMessage: "whitebox_ip/whitebox_host not allowed if not external"