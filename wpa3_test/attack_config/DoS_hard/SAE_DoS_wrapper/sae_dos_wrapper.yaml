$schema: http://json-schema.org/draft-07/schema#
name: sae_dos_wrapper
attacker_module: sae_dos_wrapper
actors:
  access_point:
    source: external
    selection:
      whitebox_host: OpenWrt
      condition: [ AP, 2_4GHz ]
      channel: 6
    setup:
      program: openwrt
      program_config:
        ssid: OpenWrt_2_4GHz
        channel: 6
        key: password123
        proto: RSN
        encryption: sae-mixed
        mode: ap
        htmode: HT20
      req_programs: [ tcpdump ]
    ip_addr: "10.0.0.1"
  client:
    source: internal
    selection:
      driver: mt76x2u
    setup:
      program: wpa_supplicant
      program_config:
        ssid: OpenWrt_2_4GHz
        sae_password: password123
        ieee80211w: 2
        proto: RSN
        key_mgmt: SAE
        pairwise: CCMP
        group: CCMP
    netns: sta
    ip_addr: "10.0.0.2"
    sniff_iface: client
  attacker:
    source: internal
    setup:
      requirements: [ ath_masker ]
    selection:
      driver: ath9k_htc
      condition: [ monitor, injection ]
      channel: 6
    sniff_iface: att
observers:
  tshark_attacker:
    actor: attacker
    program: tshark
    program_config:
      filter: ""
  ap_resources:
    actor: access_point
    program: resource_checker
    program_config:
      interval: 1
attack_config:
  attack_time_sec: 60
  # Which band the attacker adapter is on
  adapter_band: "2.4GHz"
  # Attack from orchestator_master_en.py ADAPTER_KONFIGURATION angriff field
  attack_type: "case12_bursty_auth"
  channel_5ghz: "104"
  packets_per_second_limit: 1000
  burst_size_optimal: 64
  inter_packet_gap: 0.0001
  max_restarts: 100
