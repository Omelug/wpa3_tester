$schema: http://json-schema.org/draft-07/schema#
name: bl0ck_BA_external
attacker_module: bl0ck
scan_iface: wlan1
actors:
  access_point:
    $extends: ../../target/Dlink/Dlink_wb_5Ghz.yaml

  #access_point:
  #  source: external
  #  selection:
  #    mac: "78:98:E8:55:3E:8D"
  #    condition: [ AP, 80211ac, 5GHz ]
  #client:
  #  source: external
  #  selection:
  #    condition: [ monitor, 80211ac, 5GHz ]
  client:
    source: internal
    setup:
      program: wpa_supplicant
      program_config:
        freq_list: 5180
        group: CCMP
        ieee80211w: 2
        key_mgmt: SAE
        pairwise: CCMP
        sae_password: password123
        scan_freq: 5180
        ssid: OpenWrt_5GHz
        version: 2_10
    selection:
      channel: 36
      permanent_mac: "00:c0:ca:b7:69:2a"
      condition: [ monitor, 80211ac, 5GHz ]
    netns: sta
    sniff_iface: client_mon
  attacker:
    source: internal
    selection:
      channel: 36
      condition: [ #injection, #TODO má tu být injection?
        monitor,
        5GHz ]
observers:
  att_tshark:
    actor: attacker
    program: tshark
    program_config:
      filter: "special_filter:actors"
  client_tshark:
    actor: client
    program: tshark
    program_config:
      filter: "special_filter:actors"
attack_config:
  attack_time_sec: 15
  attack_variant: "BA"
  random: false
  frame_in_batch: 50