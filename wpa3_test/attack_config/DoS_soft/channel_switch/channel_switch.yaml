$schema: http://json-schema.org/draft-07/schema#
name: channel_switch_test
attacker_module: channel_switch
$validator: ./channel_switch.schema.yaml
$extends: ./observers.comp.yaml
actors:
  access_point:
    source: internal
    selection:
      condition: [ AP ]
    setup:
      program: hostapd
      program_config:
        hostapd_path: "./config/hostapd.conf"
    ip_addr: "10.0.0.1"
  client:
    source: internal
    setup:
      program: wpa_supplicant
      program_config:
        wpa_supplicant_path: "./config/client.conf"
    netns: sta
    ip_addr: "10.0.0.2"
  attacker:
    source: internal
    selection:
      driver: mt76x2u
      condition: [ monitor ]
      channel: 6
attack_config:
  #TODO try same channel like current
  attack_time: 30
  ms_interval: 100
  new_channel: 1
rewrite: errors