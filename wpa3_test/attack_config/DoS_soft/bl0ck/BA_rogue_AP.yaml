$schema: http://json-schema.org/draft-07/schema#
$validator: ./bl0ck.schema.yaml
name: bl0ck_BA_rogue_AP
attacker_module: bl0ck
attack_config:
  attack_time_sec: 30
  attack_variant: "BA"
  random: false
  frame_in_batch: 50
actors:
  access_point:
    source: internal
    selection:
      driver: rtw88_8821au
      condition: [ AP, 80211ac, 5GHz ]
    setup:
      program: hostapd
      program_config:
        channel: 36
        driver: nl80211
        hw_mode: a
        ieee80211ac: 1
        ieee80211n: 1
        ieee80211w: 2
        rsn_pairwise: CCMP
        sae_password: password123
        ssid: wpa3_tester_AP
        version: 2_10
        vht_oper_chwidth: 0
        wpa: 2
        wpa_key_mgmt: SAE
    ip_addr: "10.0.0.1"
  client:
    source: internal
    setup:
      program: wpa_supplicant
      program_config:
        freq_list: 5180
        group: CCMP
        ieee80211w: 2
        key_mgmt: SAE
        pairwise: CCMP
        psk: "\"password123\""
        sae_password: password123
        scan_freq: 5180
        ssid: wpa3_tester_AP
        version: 2_10
    selection:
      driver: mt76x2u
      channel: 36
      condition: [ monitor, 80211ac, 5GHz ]
    netns: sta
    ip_addr: "10.0.0.2"
    sniff_iface: client_mon
  attacker:
    source: internal
    selection:
      channel: 36
      condition: [ injection, 5GHz ]
  rogue_ap:
    source: internal
    selection:
      driver: mt76x2u
      channel: 36
      condition: [ monitor ]
    setup:
      program: hostapd-mana
      program_config:
        hostapd-mana_path: ./rogue_ap_hostapd_mana.conf
