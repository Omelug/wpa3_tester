$schema: http://json-schema.org/draft-07/schema#
name: cookie_guzzler
validator: cookie_guzzler.schema.yaml
attacker_module: cookie_guzzler
actors:
  access_point:
    source: external
    selection:
      whitebox_host: OpenWrt
      condition: [ AP, 2_4GHz ]
      channel: 6
    setup:
      program: openwrt
      program_config:
        ssid: OpenWrt_2_4GHz
        channel: 6
        key: password123
        proto: RSN
        encryption: sae-mixed
        mode: ap
        htmode: HT20
      req_programs: [ tcpdump ]
    ip_addr: "10.0.0.1"
  client:
    source: internal
    selection:
      driver: mt76x2u
    setup:
      program: wpa_supplicant
      program_config:
        ssid: OpenWrt_2_4GHz
        sae_password: password123
        ieee80211w: 2
        proto: RSN
        key_mgmt: SAE
        pairwise: CCMP
        group: CCMP
    netns: sta
    ip_addr: "10.0.0.2"
    sniff_iface: client
  attacker:
    source: internal
    selection:
      driver: ath9k_htc
      condition: [ monitor, injection ]
      channel: 6
    sniff_iface: att
  #rogue_ap:
  #
  #  source: internal
  #  selection:
  #    driver: mt76x2u
  #    condition: [ monitor ]
  #    channel: 6
  #  program: hostapd_mana
  #  program_config:
observers:
  client_mausezahn:
    actor: client
    program: mausezahn
    program_config:
      target_actor: access_point
  #tshark_client:
  #  actor: client
  #  program: tshark
  #  program_config:
  #    filter: "udp port 5201"
  tshark_attacker:
    actor: attacker
    program: tshark
    program_config:
      filter: ""
  program_config_ap:
    actor: access_point
    program: tcpdump
    program_config:
      filter: "udp port 5201"
  ap_resources:
    actor: access_point
    program: resource_checker
    program_config:
      interval: 1
attack_config:
  attack_time_sec: 180